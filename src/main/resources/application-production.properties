# Production profile for Render.com deployment
spring.application.name=InternFlow

# Database - Render PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# Multipart upload limits
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:12MB}

# Connection pool settings for production
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Google OAuth
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID}

# Spring OAuth2 configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile,https://www.googleapis.com/auth/gmail.send

# Mail configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
internflow.mail.to=${INTERNFLOW_MAIL_TO}
internflow.mail.cc=${INTERNFLOW_MAIL_CC}

# Server configuration
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://your-frontend.vercel.app}

# Keep-Alive - use liveness only so Render traffic does not wake Neon compute.
app.base-url=${APP_BASE_URL:}
app.keep-alive.enabled=${KEEP_ALIVE_ENABLED:true}
app.keep-alive.endpoint=${KEEP_ALIVE_ENDPOINT:/api/health/live}
app.keep-alive.initial-delay-ms=${KEEP_ALIVE_INITIAL_DELAY_MS:60000}
app.keep-alive.interval-ms=${KEEP_ALIVE_INTERVAL_MS:840000}

# Logging
logging.level.root=INFO
logging.level.com.java6.springboot.internflow=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# Seed and privileged-account configuration
internflow.seed.enabled=${INTERNFLOW_SEED_ENABLED:true}
internflow.seed.system-data.enabled=${INTERNFLOW_SEED_SYSTEM_DATA_ENABLED:true}
internflow.seed.overwrite-system-data=${INTERNFLOW_SEED_OVERWRITE_SYSTEM_DATA:false}
internflow.seed.demo-users.enabled=${INTERNFLOW_SEED_DEMO_USERS_ENABLED:false}
internflow.seed.team-leader-emails=${INTERNFLOW_SEED_TEAM_LEADER_EMAILS:}
internflow.admin-emails=${INTERNFLOW_ADMIN_EMAILS:}
