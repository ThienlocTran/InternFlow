spring.application.name=InternFlow
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Database
# Fill these values from Neon before running the app.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/internflow}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Let Hibernate create/update tables while the project is still in MVP stage.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:durw8vp93}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Google Identity Services
# Google Cloud project: internflow-496202
# This must be the OAuth Client ID, not the Project ID/number.
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:548332785385-5t4pcftrhba9f0fj7lsnqourqgt9ik6e.apps.googleusercontent.com}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
internflow.mail.to=${INTERNFLOW_MAIL_TO:tuyendungbpns@gmail.com}
internflow.mail.cc=${INTERNFLOW_MAIL_CC:xuandat210425cty@gmail.com}

