# ============================================================
# Keep-Alive - keep Render.com service awake without touching DB
# ============================================================
# Base URL of the Render service. Example: https://internflow.onrender.com
app.base-url=${APP_BASE_URL:}

# Enable/disable keep-alive. Set KEEP_ALIVE_ENABLED=false to stop the scheduler.
app.keep-alive.enabled=${KEEP_ALIVE_ENABLED:true}

# Keep-alive must use a lightweight liveness endpoint. Do not use
# /api/health/ready or /actuator/health because those may check the database.
app.keep-alive.endpoint=${KEEP_ALIVE_ENDPOINT:/api/health/live}

# Delay after app startup before the first ping (ms)
app.keep-alive.initial-delay-ms=${KEEP_ALIVE_INITIAL_DELAY_MS:60000}

# Delay between pings (ms). Render sleeps after about 15 minutes, so use 14 minutes.
app.keep-alive.interval-ms=${KEEP_ALIVE_INTERVAL_MS:840000}

# ============================================================
# Image cleanup - safe by default
# ============================================================
# Do not enable real deletion until dry-run logs/query have been reviewed.
internflow.image-cleanup.enabled=${IMAGE_CLEANUP_ENABLED:false}
internflow.image-cleanup.dry-run=${IMAGE_CLEANUP_DRY_RUN:true}
internflow.image-cleanup.retention-after-mail-days=${IMAGE_RETENTION_AFTER_MAIL_DAYS:30}
internflow.image-cleanup.draft-retention-days=${IMAGE_DRAFT_RETENTION_DAYS:7}
internflow.image-cleanup.cohort-end-retention-days=${IMAGE_COHORT_END_RETENTION_DAYS:30}
internflow.image-cleanup.batch-size=${IMAGE_CLEANUP_BATCH_SIZE:50}
internflow.image-cleanup.initial-delay-ms=${IMAGE_CLEANUP_INITIAL_DELAY_MS:300000}
internflow.image-cleanup.interval-ms=${IMAGE_CLEANUP_INTERVAL_MS:86400000}

# Seed and privileged-account configuration
internflow.seed.enabled=${INTERNFLOW_SEED_ENABLED:true}
internflow.seed.system-data.enabled=${INTERNFLOW_SEED_SYSTEM_DATA_ENABLED:true}
internflow.seed.overwrite-system-data=${INTERNFLOW_SEED_OVERWRITE_SYSTEM_DATA:false}
internflow.seed.demo-users.enabled=${INTERNFLOW_SEED_DEMO_USERS_ENABLED:false}
internflow.seed.team-leader-emails=${INTERNFLOW_SEED_TEAM_LEADER_EMAILS:}
internflow.admin-emails=${INTERNFLOW_ADMIN_EMAILS:tranthienloc.nina@gmail.com,tranthienloc21102005@gmail.com,daonguyenquocviet9190@gmail.com}
