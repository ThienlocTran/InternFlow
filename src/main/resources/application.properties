spring.application.name=InternFlow
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Database
# Fill these values from Neon before running the app.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/internflow}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Let Hibernate create/update tables while the project is still in MVP stage.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:durw8vp93}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Google Identity Services
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
