spring.application.name=InternFlow
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Database
# Fill these values from Neon before running the app.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/internflow}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Let Hibernate create/update tables while the project is still in MVP stage.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Multipart upload limits
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:12MB}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:durw8vp93}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Google Identity Services
# Google Cloud project: internflow-496202
