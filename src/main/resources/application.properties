spring.application.name=InternFlow
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Database
# Fill these values from Neon before running the app.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/internflow}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Let Hibernate create/update tables while the project is still in MVP stage.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Multipart upload limits
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:12MB}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:durw8vp93}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Google Identity Services
# Google Cloud project: internflow-496202
# This must be the OAuth Client ID, not the Project ID/number.
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:548332785385-5t4pcftrhba9f0fj7lsnqourqgt9ik6e.apps.googleusercontent.com}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
internflow.mail.to=${INTERNFLOW_MAIL_TO:tuyendungbpns@gmail.com}
internflow.mail.cc=${INTERNFLOW_MAIL_CC:xuandat210425cty@gmail.com}

# Optional Spring OAuth2 redirect login.
# Fill these only after creating an OAuth Client in Google Cloud.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:548332785385-5t4pcftrhba9f0fj7lsnqourqgt9ik6e.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile,https://www.googleapis.com/auth/gmail.send

# ============================================================
# Keep-Alive — Giữ Render.com service luôn thức
# ============================================================
# URL gốc của service trên Render. VD: https://internflow.onrender.com
# Phải set biến môi trường APP_BASE_URL trên Render.com dashboard.
app.base-url=${APP_BASE_URL:}

# Bật/tắt tính năng keep-alive (mặc định: true khi deploy)
app.keep-alive.enabled=${KEEP_ALIVE_ENABLED:true}

# Endpoint dùng để ping (đã có sẵn, public, không cần auth)
app.keep-alive.endpoint=${KEEP_ALIVE_ENDPOINT:/api/health}

# Thời gian chờ sau khi app khởi động xong trước lần ping đầu tiên (ms)
# Mặc định 60 giây = 60,000 ms
app.keep-alive.initial-delay-ms=${KEEP_ALIVE_INITIAL_DELAY_MS:60000}

# Khoảng cách giữa các lần ping (ms).
# Render sleep sau 15 phút = 900,000 ms → dùng 14 phút = 840,000 ms
app.keep-alive.interval-ms=${KEEP_ALIVE_INTERVAL_MS:840000}
