services:
  - type: web
    name: internflow-backend
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/InternFlow-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: internflow-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: internflow-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: internflow-db
          property: password
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: INTERNFLOW_MAIL_TO
        sync: false
      - key: INTERNFLOW_MAIL_CC
        sync: false
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m -Xms256m

databases:
  - name: internflow-db
    databaseName: internflow
    user: internflow
